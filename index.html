<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fay | Professional Image Editor Portfolio</title>
    <style>
        /* CSS UTAMA & RESET TAMPILAN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            line-height: 1.8;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* Header / Hero Section */
        header {
            text-align: center;
            padding: 60px 0 30px 0;
        }

        header h1 {
            font-size: 2.8rem;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        header .bio {
            font-size: 1.15rem;
            color: #a0a0a0;
            max-width: 750px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Portfolio Section */
        .portfolio-section {
            padding: 30px 0 60px 0;
            border-top: 1px solid #232323;
        }

        /* Paragraf Utama Model Artikel Elegan (Tanpa Kotak) */
        .article-paragraph {
            font-size: 1.2rem;
            color: #cccccc;
            text-align: justify;
            max-width: 800px;
            margin: 0 auto 60px auto;
            letter-spacing: 0.3px;
        }

        /* Grid Gambar Portofolio di Bawah Artikel */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
        }

        .portfolio-item {
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
        }

        /* Wadah Gambar Portofolio */
        .image-container {
            position: relative;
            width: 100%;
            height: 240px;
            background-color: #222222;
        }

        .portfolio-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            padding: 18px;
            border-top: 1px solid #232323;
            text-align: center;
        }

        .item-info h3 {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Contact / Call to Action Section */
        .contact-section {
            text-align: center;
            padding: 60px 30px;
            background: linear-gradient(135deg, #161616 0%, #1e1e1e 100%);
            border-radius: 8px;
            margin-top: 40px;
            border: 1px solid #232323;
        }

        .contact-section h2 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .contact-section p {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .btn-whatsapp {
            display: inline-block;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp:hover {
            background-color: #20ba5a;
            transform: scale(1.02);
        }

        footer {
            text-align: center;
            padding-top: 60px;
            color: #555555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
